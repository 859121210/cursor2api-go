name: Sync Fork

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: main # 确保这里是你自己的分支名
          fetch-depth: 0

      - name: Config Git
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'

      - name: Sync Upstream
        run: |
          # 添加原作者仓库
          git remote add upstream https://github.com/libaxuan/cursor2api-go.git
          # 获取更新
          git fetch upstream
          # 合并上游 main 分支到你的本地 main 分支
          git checkout main
          git merge upstream/main
          # 推送到你的仓库
          git push origin main
